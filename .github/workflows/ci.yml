name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend (FastAPI + pytest) ─────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: intelliglove
          POSTGRES_PASSWORD: intelliglove
          POSTGRES_DB: intelliglove_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # DATABASE_URL is used by alembic (env.py reads settings.database_url).
      DATABASE_URL: postgresql+psycopg://intelliglove:intelliglove@localhost:5432/intelliglove_test
      # TEST_DATABASE_URL is used by conftest.py fixtures directly.
      TEST_DATABASE_URL: postgresql+psycopg://intelliglove:intelliglove@localhost:5432/intelliglove_test
      ENVIRONMENT: test
      FIREBASE_PROJECT_ID: test-project
      DEVELOPMENT_AUTH_BYPASS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest

      - name: Security audit (pip-audit)
        working-directory: backend
        run: pip-audit -r requirements.txt

  # ── Admin dashboard (Vitest + npm audit) ──────────────────────────────────
  dashboard:
    name: Dashboard tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin_dashboard/package-lock.json

      - name: Install dependencies
        working-directory: admin_dashboard
        run: npm ci

      - name: Run tests
        working-directory: admin_dashboard
        run: npm test

      - name: Security audit
        working-directory: admin_dashboard
        run: npm audit --audit-level=high

  # ── Flutter (unit + widget tests) ─────────────────────────────────────────
  flutter:
    name: Flutter tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Run tests
        run: flutter test
